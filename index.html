    <style>
      /* Container do vídeo: encaixa perfeitamente no mockup com cantos arredondados */
      .vsl-video-wrapper {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        border-radius: 24px !important;
        overflow: hidden !important;
        z-index: 50 !important;
        background: #000 !important;
        pointer-events: auto !important;
      }
      .vsl-video-wrapper iframe {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        border: none !important;
        pointer-events: auto !important;
      }
      /* Garante que o container do mockup não corte e aceite o vídeo */
      .aspect-\[9\/16\] {
        padding: 0 !important;
        overflow: hidden !important;
        position: relative !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      (function() {
        var injected = false;
        var checkExist = setInterval(function() {
          if (injected) { clearInterval(checkExist); return; }

          // Localiza o container interno do mockup do celular (formato 9/16)
          var container = document.querySelector('.aspect-\\[9\\/16\\]');
          
          if (container && !container.querySelector('.vsl-video-wrapper')) {
            // Injeta o player do Vimeo já com autoplay MUTADO (começa rodando sem som)
            // O usuário clica no player do próprio Vimeo para ativar o som depois.
            container.innerHTML = `
              <div class="vsl-video-wrapper">
                <iframe
                  src="https://player.vimeo.com/video/1132679540?autoplay=1&muted=1&playsinline=1&badge=0&autopause=0&player_id=0&app_id=58479"
                  allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media"
                  allowfullscreen>
                </iframe>
              </div>`;
            
            // Garante que o container pai não bloqueie o clique
            if (container.parentElement) {
              container.parentElement.style.pointerEvents = "auto";
            }

            injected = true;
            clearInterval(checkExist);
          }
        }, 100);

        // Para de tentar depois de 15s pra não ficar rodando pra sempre
        setTimeout(function() { clearInterval(checkExist); }, 15000);
      })();
    </script>
